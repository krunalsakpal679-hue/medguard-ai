name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Initialize Database Indexes
        env:
          MONGO_URI: mongodb://localhost:27017/medguard_test
          SECRET_KEY: test-secret-key-at-least-thirty-two-chars
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          S3_BUCKET: dummy
          FIREBASE_CREDENTIALS: '{"type": "service_account"}'
          CORS_ORIGINS: http://localhost:3000
          ADMIN_EMAIL: admin@test.com
        run: |
          cd backend
          export PYTHONPATH=$PYTHONPATH:.
          python scripts/create_indexes.py

      - name: Run Clinical Tests
        env:
          MONGO_URI: mongodb://localhost:27017/medguard_test
          SECRET_KEY: test-secret-key-at-least-thirty-two-chars
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          S3_BUCKET: dummy
          FIREBASE_CREDENTIALS: '{"type": "service_account"}'
          CORS_ORIGINS: http://localhost:3000
          ADMIN_EMAIL: admin@test.com
          ENVIRONMENT: test
        run: |
          cd backend
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
