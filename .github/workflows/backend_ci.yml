name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create .env for testing
        run: |
          echo "MONGO_URI=mongodb://localhost:27017/medguard_test" >> backend/.env
          echo "SECRET_KEY=test_secret_key_for_ci_alignment_123" >> backend/.env
          echo "ALGORITHM=HS256" >> backend/.env
          echo "GOOGLE_CLIENT_ID=test_id" >> backend/.env
          echo "ENVIRONMENT=testing" >> backend/.env

      - name: Run tests
        working-directory: backend
        run: |
          pytest --ignore=app/ml --ignore=tests/performance -v
        continue-on-error: true

      - name: Smoke test
        working-directory: backend
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -c "from app.main import app; print('Backend Boot: OK')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK }}
