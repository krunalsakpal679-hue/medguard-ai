name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env for testing
        run: |
          echo "MONGO_URI=mongodb://localhost:27017/medguard_test" >> backend/.env
          echo "SECRET_KEY=test_secret_key_for_ci_pipelines_12345" >> backend/.env
          echo "ENVIRONMENT=testing" >> backend/.env
          echo "ALGORITHM=HS256" >> backend/.env

      - name: Run tests
        working-directory: backend
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --ignore=app/ml --ignore=tests/performance -v
        continue-on-error: true

      - name: Smoke test
        working-directory: backend
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -c "from app.main import app; print('Backend Boot: OK')"

      - name: Trigger Render Deploy
        if: github.ref == 'refs/heads/main' && success()
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
        continue-on-error: true
