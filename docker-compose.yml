version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - redis
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    networks:
      - medguard-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    networks:
      - medguard-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    volumes:
      - ./admin:/app
    networks:
      - medguard-network

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=medguard
    networks:
      - medguard-network

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    networks:
      - medguard-network

volumes:
  mongo_data:

networks:
  medguard-network:
    driver: bridge
